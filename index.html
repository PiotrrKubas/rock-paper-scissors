<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK PAPER SCISSORS</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body style="background-color: rgb(32, 4, 133);">

    <div class="scores">
        <div class="player-score">
            <h2 class="score">Player</h2>
            <h2 class="score">123</h2>
        </div>
        <div class="computer-score">
            <h2 class="score">Computer</h2>
            <h2 class="score">123</h2>
        </div>
    </div>

    <div class="play-zone">
        <div class="player-choice">
            <button><img src="./rock.png" alt="Image of rock"></button>
            <button><img src="./paper.png" alt="Image of paper"></button>
            <button><img src="./scissors.png" alt="Image of scissors"></button>

        </div>
        <p class="winner">Winner</p>
        <div class="computer-choice">
            <button><img src="./rock.png" alt="Image of rock"></button>
            <button><img src="./paper.png" alt="Image of paper"></button>
            <button><img src="./scissors.png" alt="Image of scissors"></button>
        </div>
    </div>


    <script src="./script.js"></script>
</body>

</html>
