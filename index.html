<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK PAPER SCISSORS</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body style="background-color: rgb(32, 4, 133);">

    <div class="player">
        <div class="score">
            <p>HUMAN</p>
            <p class="human-score"></p>
        </div>

        <div class="choice flip">
            <button class="player-button" id="rock"><img src="./rock.png" alt="Image of rock"></button>
            <button class="player-button" id="paper"><img src="./paper.png" alt="Image of paper"></button>
            <button class="player-button" id="scissors"><img src="./scissors.png" alt="Image of scissors"></button>

        </div>
    </div>

    <div class="play-zone">
        <p class="game-status">Winner</p>
    </div>

    <div class="computer">
        <div class="score">
            <p>COMPUTER</p>
            <p class="computer-score"></p>
        </div>
        <div class="choice">
            <button class="disable"><img src="./rock.png" alt="Image of rock"></button>
            <button class="disable"><img src="./paper.png" alt="Image of paper"></button>
            <button class="disable"><img src="./scissors.png" alt="Image of scissors"></button>
        </div>
    </div>



    <script src="./script.js"></script>
</body>

</html>
